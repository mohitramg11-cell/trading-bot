name: Trading Bot

on:
  workflow_dispatch:
  schedule:
    - cron: "*/15 3-10 * * 1-5"

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install Requirements
        run: pip install -r requirements.txt

      - name: Run Bot
        run: python bot.py
